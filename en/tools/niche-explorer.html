<style>
  :root{--bg:#0a0a0f;--ink:#fff;--muted:#9aa0b4;--muted2:#6b7185;--a1:#ff3d3d;--a2:#ff8a00;--card:#16161f;--line:#262633;--good:#39d98a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(900px 500px at 75% -10%,#20121f 0%,var(--bg) 55%),var(--bg);color:#e7e9f2;line-height:1.5;padding:34px 20px 70px}
  .wrap{max-width:860px;margin:0 auto}
  .grad{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .kick{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--a2);margin-bottom:8px}
  h1{font-size:clamp(24px,4.5vw,36px);font-weight:800;letter-spacing:-.02em;color:#fff;margin-bottom:6px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:20px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  #q{flex:1;min-width:180px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#0d0d14;color:#fff;font-size:14px}
  #q:focus{outline:none;border-color:var(--a2)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 4px}
  .chip{font-size:12px;font-weight:700;color:#cdd2e2;background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:999px;cursor:pointer}
  .chip.on{color:#0a0a0f;background:linear-gradient(90deg,var(--a1),var(--a2));border-color:transparent}
  .count{color:var(--muted2);font-size:13px;margin:8px 0}
  .list{display:flex;flex-direction:column;gap:10px}
  .n{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .n .top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .n .num{color:var(--a2);font-weight:800;font-size:14px;min-width:26px}
  .n .name{font-weight:700;color:#fff;font-size:15px}
  .n .star{color:var(--good);font-weight:800}
  .n .tag{margin-left:auto;font-size:11px;font-weight:700;color:#0a0a0f;background:linear-gradient(90deg,var(--a1),var(--a2));padding:2px 9px;border-radius:999px;white-space:nowrap}
  .n .why{color:var(--muted);font-size:13.5px;padding-left:36px}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick">AI Shorts Mastery · Tool</div>
  <h1>Niche <span class="grad">Explorer</span></h1>
  <div class="sub">30 high-potential niches. Filter by category, search, or show only the ★ to get started.</div>

  <div class="controls"><input id="q" placeholder="Search niche… (e.g.: animals, horror, facts)"></div>
  <div class="chips" id="chips"></div>
  <div class="count" id="count"></div>
  <div class="list" id="list"></div>
</div>
<script>
  var N=[
   [1,"Animated nursery rhymes","Kids","Infinite catalog, global, language-free",0],
   [2,"Dancing animals/characters","Kids","Short loops + music; perfect for AI (CocoBunny style)",1],
   [3,"Learn while playing (colors, numbers)","Kids","Infinite combinations, visual and simple",0],
   [4,"Mini fables with a moral","Kids","Endless tales in animated scenes",0],
   [5,"Fun facts / did you know","Facts","One fact + the scene that illustrates it; very shareable",1],
   [6,"Science explained in 30s","Facts","Why does X happen?; AI visualizes the phenomenon",0],
   [7,"History: what happened to…","Facts","All of history as material; AI recreates eras",0],
   [8,"Mythology","Facts","Gods and creatures; AI shines with fantastical beings",0],
   [9,"Space / the universe","Facts","Planets, black holes; cinematic",0],
   [10,"Size comparisons","Facts","How big is…?; very visual",0],
   [11,"What if…?","What-if","Extreme scenario + consequences (dramatic what-if style)",1],
   [12,"Who survives/escapes first?","What-if","Characters with roles; the viewer places bets",1],
   [13,"Who would win? / versus","What-if","Matchups; endless combinations",0],
   [14,"Immersive POV","What-if","You wake up in/as…; highly addictive",0],
   [15,"Mini stories with a final twist","Stories","30s with a twist; 2-3 scenes + voiceover",0],
   [16,"Short horror / creepy","Stories","AI nails dark atmospheres",0],
   [17,"Unsolved mysteries","Stories","Atmospheric recreations",0],
   [18,"Incredible true stories","Stories","Survived a…; AI recreates the scene",0],
   [19,"Oddly satisfying","Visual","Hypnotic visuals; AI generates the impossible",0],
   [20,"Visual ASMR / relaxing landscapes","Visual","Dreamlike landscapes on a loop",0],
   [21,"Cinematic nature","Visual","Documentary shots impossible to film",0],
   [22,"Animals acting like humans","Animals","Comedy; the king of Shorts",1],
   [23,"Fantasy creatures if they existed","Animals","Dragons, hybrids; perfect for AI",0],
   [24,"Dream luxury","Lifestyle","Houses, cars, islands; better RPM",0],
   [25,"Architecture / cities of the future","Lifestyle","The house of the future; AI shines",0],
   [26,"Motivation / stoicism","High RPM","Quote + cinematic visual (stand out)",0],
   [27,"Personal finance for beginners","High RPM","High RPM, lower volume; ideal 2nd channel",0],
   [28,"Tech / AI news","High RPM","This AI does X; infinite topics",0],
   [29,"Rankings / visual Top 5","Entertainment","One scene per spot; infinite ideas",0],
   [30,"Impossible / giant food","Entertainment","What if food were…?; very visual",0]
  ];
  var cats=["All","★ Top 5"].concat(N.map(function(x){return x[2];}).filter(function(v,i,a){return a.indexOf(v)===i;}));
  var active="All";
  var chips=document.getElementById('chips');
  cats.forEach(function(c){var b=document.createElement('button');b.className='chip'+(c==='All'?' on':'');b.textContent=c;b.onclick=function(){active=c;[].forEach.call(chips.children,function(x){x.classList.toggle('on',x.textContent===c);});render();};chips.appendChild(b);});
  document.getElementById('q').addEventListener('input',render);
  function render(){
    var q=document.getElementById('q').value.toLowerCase().trim();
    var rows=N.filter(function(x){
      if(active==='★ Top 5' && !x[4]) return false;
      if(active!=='All' && active!=='★ Top 5' && x[2]!==active) return false;
      if(q && (x[1]+' '+x[2]+' '+x[3]).toLowerCase().indexOf(q)<0) return false;
      return true;
    });
    document.getElementById('count').textContent=rows.length+' niche'+(rows.length===1?'':'s');
    document.getElementById('list').innerHTML=rows.map(function(x){
      return '<div class="n"><div class="top"><span class="num">'+x[0]+'</span><span class="name">'+x[1]+(x[4]?' <span class="star">★</span>':'')+'</span><span class="tag">'+x[2]+'</span></div><div class="why">'+x[3]+'</div></div>';
    }).join('') || '<div class="why" style="padding:0">No results.</div>';
  }
  render();
</script>
</body>
</html>
