<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de canales · AI Shorts Mastery</title>
<style>
  :root{--bg:#0a0a0f;--ink:#fff;--muted:#9aa0b4;--muted2:#6b7185;--a1:#ff3d3d;--a2:#ff8a00;--card:#16161f;--line:#262633;--good:#39d98a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(900px 500px at 75% -10%,#20121f 0%,var(--bg) 55%),var(--bg);color:#e7e9f2;line-height:1.5;padding:34px 20px 70px}
  .wrap{max-width:820px;margin:0 auto}
  .grad{background:linear-gradient(90deg,var(--a1),var(--a2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .kick{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--a2);margin-bottom:8px}
  h1{font-size:clamp(24px,4.5vw,36px);font-weight:800;letter-spacing:-.02em;color:#fff;margin-bottom:6px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:20px}
  .bar{display:flex;gap:10px;margin-bottom:6px}
  #q{flex:1;padding:13px 14px;border:1px solid var(--line);border-radius:10px;background:#0d0d14;color:#fff;font-size:15px}
  #q:focus{outline:none;border-color:var(--a2)}
  #go{background:linear-gradient(90deg,var(--a1),var(--a2));color:#0a0a0f;font-weight:800;border:none;border-radius:10px;padding:0 20px;font-size:15px;cursor:pointer}
  .hint{color:var(--muted2);font-size:12px;margin-bottom:16px}
  .msg{color:var(--muted);font-size:14px;margin:14px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
  .v{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;text-decoration:none;color:#e7e9f2;display:block}
  .v img{width:100%;aspect-ratio:16/9;object-fit:cover;background:#000;display:block}
  .v .b{padding:11px 12px}
  .v .t{font-size:13.5px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .v .c{color:var(--muted);font-size:12px;margin-top:5px}
  .v .views{color:var(--good);font-weight:800;font-size:14px;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="kick">AI Shorts Mastery · Herramienta</div>
  <h1>Buscador de <span class="grad">canales</span></h1>
  <div class="sub">Busca por nicho o tema y mira los vídeos con más visitas para inspirarte y hacer estudio de mercado. Datos públicos reales de YouTube.</div>

  <div class="bar">
    <input id="q" placeholder="Ej: animales bailando, datos curiosos, qué pasaría si…" onkeydown="if(event.key==='Enter')buscar()">
    <button id="go" onclick="buscar()">Buscar</button>
  </div>
  <div class="hint">💡 Fíjate en los que tienen muchas visitas: ese formato funciona. Copia la estructura, no el contenido.</div>

  <div class="msg" id="msg"></div>
  <div class="grid" id="grid"></div>
</div>
<script>
  function n(x){return Number(x).toLocaleString('es-ES');}
  function buscar(){
    var q=document.getElementById('q').value.trim();
    if(!q){return;}
    var msg=document.getElementById('msg'), grid=document.getElementById('grid');
    grid.innerHTML=''; msg.textContent='Buscando…';
    fetch('buscar-canales.php?q='+encodeURIComponent(q))
      .then(function(r){return r.json();})
      .then(function(d){
        if(!d.ok){
          if(d.error==='falta_api_key'){ msg.innerHTML='⚠️ Falta configurar la API key de YouTube en el servidor.'; }
          else { msg.textContent='No se pudo buscar ahora mismo. Inténtalo de nuevo.'; }
          return;
        }
        if(!d.items.length){ msg.textContent='Sin resultados. Prueba otra palabra.'; return; }
        msg.textContent=d.items.length+' vídeos (ordenados por visitas)';
        grid.innerHTML=d.items.map(function(v){
          return '<a class="v" href="https://www.youtube.com/watch?v='+v.id+'" target="_blank" rel="noopener">'+
            '<img src="'+v.thumb+'" referrerpolicy="no-referrer" alt="">'+
            '<div class="b"><div class="t">'+v.title.replace(/</g,'&lt;')+'</div>'+
            '<div class="c">'+v.channel.replace(/</g,'&lt;')+'</div>'+
            '<div class="views">'+n(v.views)+' visitas</div></div></a>';
        }).join('');
      })
      .catch(function(){ msg.textContent='Error de conexión.'; });
  }
</script>
</body>
</html>
